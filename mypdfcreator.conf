<VirtualHost *:80>
    ServerName editpdf.fr
    ServerAlias www.editpdf.fr
    DocumentRoot /var/www/mypdfeditor/dist

    <Directory /var/www/mypdfeditor/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # SPA fallback : redirige tout vers index.html
        FallbackResource /index.html
    </Directory>

    # Cache long pour les assets Vite (fichiers hashes)
    <Directory /var/www/mypdfeditor/dist/assets>
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresDefault "access plus 1 year"
        </IfModule>
        Header set Cache-Control "public, immutable"
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/editpdf_error.log
    CustomLog ${APACHE_LOG_DIR}/editpdf_access.log combined
</VirtualHost>
